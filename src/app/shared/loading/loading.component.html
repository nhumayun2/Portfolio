<div
  class="fixed inset-0 z-[9999] flex flex-col items-center justify-center bg-[#030014]"
>
  <div class="relative flex items-center justify-center h-64 w-64">
    <div
      class="absolute inset-0 rounded-full border-t-2 border-l-2 border-purple-500/50 blur-[2px] animate-spin-slow"
    ></div>
    <div
      class="absolute inset-4 rounded-full border-b-2 border-r-2 border-cyan-500/50 blur-[1px] animate-spin-reverse"
    ></div>

    <div
      class="absolute h-32 w-32 rounded-full bg-gradient-to-r from-purple-600 to-cyan-600 blur-[40px] opacity-20 animate-pulse"
    ></div>

    <div
      class="relative h-24 w-24 rounded-full bg-black shadow-[0_0_50px_rgba(168,85,247,0.4)] border border-white/5"
    ></div>
  </div>

  <div class="mt-12 text-center">
    <p
      class="text-xl font-bold tracking-[0.2em] text-white uppercase animate-pulse"
    >
      {{ message }}
    </p>
    <div class="mt-4 flex justify-center gap-1">
      <span
        class="h-1.5 w-1.5 rounded-full bg-purple-500 animate-bounce [animation-delay:-0.3s]"
      ></span>
      <span
        class="h-1.5 w-1.5 rounded-full bg-cyan-500 animate-bounce [animation-delay:-0.15s]"
      ></span>
      <span
        class="h-1.5 w-1.5 rounded-full bg-purple-500 animate-bounce"
      ></span>
    </div>
  </div>
</div>
