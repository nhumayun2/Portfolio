<footer
  class="relative mt-12 border-t border-white/[0.05] bg-[#030014] pt-16 pb-8 overflow-hidden z-20"
>
  <div
    class="absolute bottom-[-150px] left-1/2 -translate-x-1/2 w-[800px] h-[300px] bg-gradient-to-t from-[#a388f5]/10 via-[#a388f5]/5 to-transparent blur-[100px] rounded-full pointer-events-none"
  ></div>

  <div class="container mx-auto px-6 max-w-7xl relative z-10">
    <div
      class="flex flex-col md:flex-row justify-between items-center gap-8 mb-12"
    >
      <div class="text-center md:text-left">
        <h2 class="text-2xl font-bold text-white tracking-tighter">
          {{ profile()?.fullName || "Humayun Ahmed Niloy" }}
        </h2>
        <p class="text-slate-400 text-sm mt-2 max-w-sm">
          Software Engineer architecting scalable full-stack solutions and
          next-generation applications.
        </p>
      </div>

      <button
        (click)="scrollToTop()"
        class="group flex h-14 w-14 items-center justify-center rounded-full border border-white/[0.05] bg-[#0d1126] text-slate-400 transition-all duration-300 hover:border-[#a388f5]/50 hover:bg-[#a388f5]/10 hover:text-white hover:shadow-[0_0_20px_rgba(163,136,245,0.2)] active:scale-95"
        title="Back to top"
      >
        <i
          class="fas fa-arrow-up text-lg transition-transform duration-300 group-hover:-translate-y-1"
        ></i>
      </button>
    </div>

    <div
      class="h-[1px] w-full bg-gradient-to-r from-transparent via-white/[0.1] to-transparent mb-8"
    ></div>

    <div
      class="flex flex-col md:flex-row justify-between items-center gap-4 text-xs md:text-sm text-slate-500 font-medium"
    >
      <p>
        &copy; {{ currentYear }}
        {{ profile()?.fullName || "Humayun Ahmed Niloy" }}. All rights reserved.
      </p>

      <div class="flex items-center gap-6">
        <a
          [href]="'mailto:' + (profile()?.email || 'nhumayun291@gmail.com')"
          class="hover:text-[#a388f5] transition-colors duration-300 flex items-center gap-2"
        >
          <i class="fas fa-envelope"></i>
          {{ profile()?.email || "nhumayun291@gmail.com" }}
        </a>
      </div>
    </div>
  </div>
</footer>
