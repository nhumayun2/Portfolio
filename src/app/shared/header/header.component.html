<header
  class="fixed w-full top-0 z-[100] transition-all duration-500"
  [class.header-is-scrolled]="isScrolled"
>
  <nav
    class="container mx-auto px-4 md:px-10 h-[70px] flex items-center justify-between relative"
  >
    <div
      class="flex items-center gap-2 transition-all duration-500 transform relative z-[120]"
      [ngClass]="{
        'md:opacity-0 md:-translate-x-10 md:pointer-events-none': isScrolled,
      }"
    >
      <a href="#hero" class="flex items-center gap-3" (click)="closeMenu()">
        <div
          class="w-10 h-10 rounded-xl bg-white/5 border border-white/10 flex items-center justify-center shadow-[0_0_15px_rgba(112,66,248,0.3)]"
        >
          <span
            class="text-xl font-bold text-transparent bg-clip-text bg-gradient-to-br from-purple-500 to-cyan-500"
            >H</span
          >
        </div>
        <span class="text-xl font-bold text-gray-300 tracking-tighter">
          Humayun A.
        </span>
      </a>
    </div>

    <div
      class="hidden md:flex absolute left-1/2 -translate-x-1/2 items-center transition-all duration-500 z-[100]"
      [class.top-4]="isScrolled"
    >
      <div
        class="flex items-center justify-center gap-6 px-8 py-2.5 rounded-full border border-[#7042f861] bg-[#0300145e] backdrop-blur-md shadow-lg shadow-[#2A0E61]/50"
      >
        <a
          href="#about"
          class="text-sm font-medium text-gray-200 hover:text-purple-400 transition-colors"
          >About</a
        >
        <a
          href="#journey"
          class="text-sm font-medium text-gray-200 hover:text-purple-400 transition-colors"
          >Journey</a
        >
        <a
          href="#skills"
          class="text-sm font-medium text-gray-200 hover:text-purple-400 transition-colors"
          >Skills</a
        >
        <a
          href="#projects"
          class="text-sm font-medium text-gray-200 hover:text-purple-400 transition-colors"
          >Projects</a
        >
        <a
          href="#contact"
          class="text-sm font-medium text-gray-200 hover:text-purple-400 transition-colors"
          >Contact</a
        >
      </div>
    </div>

    <div
      class="hidden lg:flex items-center gap-5 transition-all duration-500 transform"
      [class.opacity-0]="isScrolled"
      [class.translate-x-10]="isScrolled"
      [class.pointer-events-none]="isScrolled"
    >
      @if (profile(); as data) {
        @if (data.gitHubUrl) {
          <a
            [href]="data.gitHubUrl"
            target="_blank"
            class="text-white hover:text-purple-400 transition-all text-xl"
            ><i class="fab fa-github"></i
          ></a>
        }
        @if (data.linkedInUrl) {
          <a
            [href]="data.linkedInUrl"
            target="_blank"
            class="text-white hover:text-blue-400 transition-all text-xl"
            ><i class="fab fa-linkedin"></i
          ></a>
        }
        <a
          href="#contact"
          class="text-white hover:text-pink-400 transition-all text-xl"
          ><i class="fas fa-envelope"></i
        ></a>
      }
    </div>

    <button
      class="md:hidden relative z-[120] flex items-center justify-center w-12 h-12 rounded-full bg-white/5 border border-white/10 text-white backdrop-blur-md transition-all active:scale-95 shadow-[0_0_15px_rgba(0,0,0,0.5)]"
      (click)="toggleMobileMenu()"
    >
      <i
        class="fas text-xl transition-transform duration-300"
        [ngClass]="isMenuOpen ? 'fa-times rotate-90' : 'fa-bars'"
      ></i>
    </button>
  </nav>

  <div
    class="md:hidden fixed inset-0 h-[100dvh] w-full bg-[#030014]/95 backdrop-blur-2xl z-[110] flex flex-col items-center justify-center transition-all duration-500 ease-in-out"
    [class.opacity-0]="!isMenuOpen"
    [class.pointer-events-none]="!isMenuOpen"
    [class.translate-y-[-10px]]="!isMenuOpen"
  >
    <div class="flex flex-col items-center gap-8 w-full px-6">
      <a
        href="#about"
        (click)="closeMenu()"
        class="text-3xl font-bold text-white hover:text-purple-400 transition-colors tracking-tight"
        >About Me</a
      >
      <div class="h-px w-16 bg-white/10"></div>

      <a
        href="#journey"
        (click)="closeMenu()"
        class="text-3xl font-bold text-white hover:text-cyan-400 transition-colors tracking-tight"
        >My Journey</a
      >
      <div class="h-px w-16 bg-white/10"></div>

      <a
        href="#skills"
        (click)="closeMenu()"
        class="text-3xl font-bold text-white hover:text-lime-400 transition-colors tracking-tight"
        >Tech Skills</a
      >
      <div class="h-px w-16 bg-white/10"></div>

      <a
        href="#projects"
        (click)="closeMenu()"
        class="text-3xl font-bold text-white hover:text-pink-400 transition-colors tracking-tight"
        >Projects</a
      >
      <div class="h-px w-16 bg-white/10"></div>

      <a
        href="#contact"
        (click)="closeMenu()"
        class="text-3xl font-bold text-white hover:text-purple-400 transition-colors tracking-tight"
        >Contact</a
      >
    </div>

    <div class="flex gap-6 mt-12">
      @if (profile(); as data) {
        @if (data.gitHubUrl) {
          <a
            [href]="data.gitHubUrl"
            target="_blank"
            class="flex h-12 w-12 items-center justify-center rounded-full bg-white/5 border border-white/10 text-white hover:bg-white/10 hover:text-purple-400 transition-all text-xl"
            ><i class="fab fa-github"></i
          ></a>
        }
        @if (data.linkedInUrl) {
          <a
            [href]="data.linkedInUrl"
            target="_blank"
            class="flex h-12 w-12 items-center justify-center rounded-full bg-white/5 border border-white/10 text-white hover:bg-white/10 hover:text-blue-400 transition-all text-xl"
            ><i class="fab fa-linkedin"></i
          ></a>
        }
      }
    </div>
  </div>
</header>
