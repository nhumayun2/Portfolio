<header
  class="fixed w-full top-0 z-[100] transition-all duration-500"
  [class.header-is-scrolled]="isScrolled"
>
  <nav
    class="container mx-auto px-4 md:px-10 h-[70px] flex items-center justify-between relative"
  >
    <div
      class="flex items-center gap-2 transition-all duration-500 transform"
      [class.opacity-0]="isScrolled"
      [class.-translate-x-10]="isScrolled"
      [class.pointer-events-none]="isScrolled"
    >
      <a href="#hero" class="flex items-center gap-3">
        <div
          class="w-10 h-10 rounded-xl bg-white/5 border border-white/10 flex items-center justify-center shadow-[0_0_15px_rgba(112,66,248,0.3)]"
        >
          <span
            class="text-xl font-bold text-transparent bg-clip-text bg-gradient-to-br from-purple-500 to-cyan-500"
            >H</span
          >
        </div>
        <span
          class="hidden md:block text-xl font-bold text-gray-300 tracking-tighter"
        >
          Humayun A.
        </span>
      </a>
    </div>

    <div
      class="absolute left-1/2 -translate-x-1/2 flex items-center transition-all duration-500"
      [class.top-4]="isScrolled"
    >
      <div
        class="flex items-center justify-center gap-1 md:gap-6 px-4 md:px-8 py-2.5 rounded-full border border-[#7042f861] bg-[#0300145e] backdrop-blur-md shadow-lg shadow-[#2A0E61]/50"
      >
        <a
          href="#about"
          class="cursor-pointer text-xs md:text-sm font-medium text-gray-200 hover:text-purple-400 transition-colors"
          >About</a
        >
        <a
          href="#skills"
          class="cursor-pointer text-xs md:text-sm font-medium text-gray-200 hover:text-purple-400 transition-colors"
          >Skills</a
        >
        <a
          href="#portfolio"
          class="cursor-pointer text-xs md:text-sm font-medium text-gray-200 hover:text-purple-400 transition-colors"
          >Projects</a
        >
        <a
          href="#experience"
          class="cursor-pointer text-xs md:text-sm font-medium text-gray-200 hover:text-purple-400 transition-colors"
          >Journey</a
        >
      </div>
    </div>

    <div
      class="hidden lg:flex items-center gap-5 transition-all duration-500 transform"
      [class.opacity-0]="isScrolled"
      [class.translate-x-10]="isScrolled"
      [class.pointer-events-none]="isScrolled"
    >
      @if (profile(); as data) {
        @if (data.gitHubUrl) {
          <a
            [href]="data.gitHubUrl"
            target="_blank"
            class="text-white hover:text-purple-400 transition-all text-xl"
          >
            <i class="fab fa-github"></i>
          </a>
        }
        @if (data.linkedInUrl) {
          <a
            [href]="data.linkedInUrl"
            target="_blank"
            class="text-white hover:text-blue-400 transition-all text-xl"
          >
            <i class="fab fa-linkedin"></i>
          </a>
        }
        <a
          href="#contact"
          class="text-white hover:text-pink-400 transition-all text-xl"
        >
          <i class="fas fa-envelope"></i>
        </a>
      }
    </div>

    <button
      class="md:hidden text-white text-2xl transition-opacity duration-500"
      [class.opacity-0]="isScrolled"
      (click)="toggleMobileMenu()"
    >
      <i class="fas fa-bars"></i>
    </button>
  </nav>
</header>
