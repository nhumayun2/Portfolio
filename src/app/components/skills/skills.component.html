<section
  id="skills"
  class="relative bg-[var(--color-brand-surface)] text-[var(--color-brand-text-on-dark)] py-20 md:py-32 overflow-hidden"
>
  <div class="blob-scene">
    <div class="blob blob-1" style="top: -10%; left: -10%; opacity: 0.25"></div>
    <div
      class="blob blob-2"
      style="bottom: -20%; right: -10%; opacity: 0.2"
    ></div>
    <div class="blob blob-3" style="top: 40%; left: 30%; opacity: 0.15"></div>
    <div class="blob-ring blob-ring-2" style="top: 15%; right: 25%"></div>
  </div>

  <div class="container mx-auto px-6 relative z-10">
    <div
      class="text-center mb-16 md:mb-24 opacity-0 apply-fade-in-up"
      style="animation-delay: 0.1s"
    >
      <h2
        class="text-4xl md:text-6xl font-[var(--font-display)] font-bold mb-6 text-white"
      >
        My
        <span
          class="text-transparent bg-clip-text bg-gradient-to-r from-[var(--color-brand-primary)] to-[var(--color-brand-highlight)]"
          >Skills</span
        >
      </h2>
      <div
        class="w-32 h-1.5 bg-gradient-to-r from-[var(--color-brand-primary)] to-[var(--color-brand-highlight)] mx-auto rounded-full"
      ></div>
    </div>

    <div
      class="relative opacity-0 apply-fade-in-up"
      style="animation-delay: 0.3s"
    >
      @if (skills().length === 0) {
        <div
          class="flex flex-col justify-center items-center h-80 w-full glass-card rounded-3xl shadow-2xl"
        >
          <div
            class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-[var(--color-brand-primary)]"
          ></div>
          <p
            class="mt-4 text-slate-300 font-[var(--font-body)] font-medium tracking-wide"
          >
            Loading skills from database...
          </p>
        </div>
      }

      <div [class.hidden]="skills().length === 0" class="relative">
        <swiper-container #skillsSwiper class="skills-swiper" init="false">
          @for (skill of skills(); track skill.id) {
            <swiper-slide>
              <div
                class="glass-card p-8 md:p-10 rounded-[30px] shadow-[0_8px_32px_0_rgba(0,0,0,0.3)] h-full flex flex-col transition-all duration-500 ease-out group hover:-translate-y-3 hover:bg-white/10 hover:border-white/30 relative overflow-hidden"
              >
                <div
                  class="absolute top-0 left-0 w-full h-1.5 opacity-70 group-hover:opacity-100 transition-opacity"
                  [style.backgroundColor]="skill.accentColorVar"
                ></div>

                <div
                  class="absolute -inset-4 rounded-[40px] blur-2xl opacity-0 group-hover:opacity-15 transition-opacity duration-500 z-0 pointer-events-none"
                  [style.backgroundColor]="skill.accentColorVar"
                ></div>

                <div
                  class="flex items-center mb-8 relative z-10"
                  [style.color]="skill.accentColorVar"
                >
                  <div
                    class="w-14 h-14 rounded-2xl bg-white/5 border border-white/10 flex items-center justify-center shadow-inner mr-5 group-hover:scale-110 transition-transform duration-300 group-hover:shadow-[0_0_20px_rgba(255,255,255,0.1)]"
                  >
                    <i
                      class="{{
                        skill.icon
                      }} text-2xl md:text-3xl drop-shadow-md"
                    ></i>
                  </div>
                  <h3
                    class="text-2xl md:text-3xl font-[var(--font-display)] font-bold text-white tracking-wide transition-colors duration-300"
                    [style.textShadow]="
                      '0 0 15px ' + skill.accentColorVar + '50'
                    "
                  >
                    {{ skill.title }}
                  </h3>
                </div>

                <ul
                  class="font-[var(--font-body)] text-slate-300 space-y-4 list-inside flex-grow text-left relative z-10"
                >
                  @for (item of skill.items; track $index) {
                    <li
                      class="flex items-start text-base md:text-lg group/item hover:text-white transition-colors duration-200"
                    >
                      <span
                        class="w-2 h-2 rounded-full mt-2 mr-4 shrink-0 shadow-[0_0_8px_rgba(255,255,255,0.5)] transition-transform duration-300 group-hover/item:scale-150"
                        [style.backgroundColor]="skill.accentColorVar"
                      ></span>
                      <span class="break-words leading-relaxed font-medium">{{
                        item
                      }}</span>
                    </li>
                  }
                </ul>
              </div>
            </swiper-slide>
          }
        </swiper-container>

        <div
          class="swiper-button-prev-skills custom-swiper-nav absolute top-1/2 -left-4 sm:-left-6 md:-left-10 transform -translate-y-1/2 z-20 text-white bg-white/5 backdrop-blur-xl border border-white/20 w-14 h-14 flex items-center justify-center rounded-full hover:bg-white/20 transition-all duration-300 cursor-pointer shadow-[0_8px_32px_rgba(0,0,0,0.4)] hover:scale-110"
        >
          <i class="fas fa-chevron-left text-xl"></i>
        </div>
        <div
          class="swiper-button-next-skills custom-swiper-nav absolute top-1/2 -right-4 sm:-right-6 md:-right-10 transform -translate-y-1/2 z-20 text-white bg-white/5 backdrop-blur-xl border border-white/20 w-14 h-14 flex items-center justify-center rounded-full hover:bg-white/20 transition-all duration-300 cursor-pointer shadow-[0_8px_32px_rgba(0,0,0,0.4)] hover:scale-110"
        >
          <i class="fas fa-chevron-right text-xl"></i>
        </div>
        <div
          class="swiper-pagination-skills static mt-10 text-center z-20 relative"
        ></div>
      </div>
    </div>
  </div>
</section>
