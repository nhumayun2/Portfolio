<section id="skills" class="relative py-24 bg-transparent overflow-hidden">
  <div
    class="absolute top-0 left-0 w-full h-32 bg-gradient-to-b from-[#030014] to-transparent z-[1]"
  ></div>

  <div class="container mx-auto px-6 relative z-10">
    <div class="text-center mb-16">
      <h2 class="text-4xl md:text-6xl font-bold text-white tracking-tighter">
        Technical
        <span
          class="text-transparent bg-clip-text bg-gradient-to-r from-purple-500 to-cyan-500"
          >Proficiency</span
        >
      </h2>
      <p class="text-gray-400 mt-4 text-lg italic max-w-2xl mx-auto">
        These are the tools and technologies I use to bring ideas to life.
      </p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
      @for (skill of skills(); track skill.id) {
        <div
          class="group relative p-[1px] rounded-2xl overflow-hidden transition-all duration-300 hover:scale-[1.02]"
        >
          <div
            class="absolute inset-0 bg-gradient-to-br from-purple-500/20 via-transparent to-cyan-500/20"
          ></div>

          <div
            class="relative h-full bg-[#0300145e] backdrop-blur-xl p-8 rounded-2xl border border-white/[0.05]"
          >
            <div class="flex items-center gap-4 mb-6">
              <i [class]="skill.icon + ' text-3xl text-purple-400'"></i>
              <h3 class="text-xl font-bold text-white">{{ skill.title }}</h3>
            </div>

            <div class="flex flex-wrap gap-2">
              @for (item of skill.items; track item) {
                <span
                  class="text-xs font-medium px-3 py-1 rounded-full bg-[#10132e] text-slate-300 border border-white/[0.05]"
                >
                  {{ item }}
                </span>
              }
            </div>
          </div>
        </div>
      }
    </div>
  </div>

  <div
    class="absolute bottom-0 left-0 w-full h-32 bg-gradient-to-t from-[#030014] to-transparent z-[1]"
  ></div>
</section>
