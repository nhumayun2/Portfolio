<section
  id="skills"
  class="relative min-h-screen w-full flex flex-col items-center justify-center py-20 overflow-hidden bg-transparent"
>
  <div
    class="absolute inset-0 z-0 flex items-center justify-center pointer-events-none"
  >
    <video
      autoplay
      muted
      loop
      playsinline
      class="w-full h-full object-cover opacity-20 mix-blend-screen"
    >
      <source src="/skills-bg.webm" type="video/webm" />
    </video>
    <div
      class="absolute h-[500px] w-[500px] bg-purple-600/20 blur-[120px] rounded-full"
    ></div>
  </div>

  <div class="container mx-auto px-6 relative z-10">
    <div class="text-center mb-16">
      <div
        class="Welcome-box py-[8px] px-[12px] border border-[#7042f88b] opacity-[0.9] flex items-center w-max bg-[#0300145e] backdrop-blur-md mx-auto mb-6"
      >
        <i class="fas fa-rocket text-[#b49bff] mr-[10px] text-sm"></i>
        <h2
          class="Welcome-text text-[13px] font-semibold uppercase tracking-widest"
        >
          Think better with modern tech
        </h2>
      </div>

      <h3 class="text-4xl md:text-5xl font-bold text-white tracking-tighter">
        Making apps with
        <span
          class="text-transparent bg-clip-text bg-gradient-to-r from-purple-500 to-cyan-500"
          >modern technologies</span
        >
      </h3>
      <p class="text-gray-400 mt-4 text-lg italic italic-text">
        "Never miss a task, deadline or idea."
      </p>
    </div>

    <div class="flex flex-col items-center justify-center gap-10 mt-10">
      <div
        class="flex flex-wrap items-center justify-center gap-5 max-w-[900px]"
      >
        @for (skill of skills(); track skill.id) {
          @for (item of skill.items; track item; let i = $index) {
            <div
              class="group relative flex h-16 w-16 md:h-20 md:w-20 items-center justify-center rounded-xl border border-white/[0.1] bg-[#0300145e] backdrop-blur-xl transition-all duration-300 hover:border-purple-500 hover:scale-110 hover:shadow-[0_0_20px_rgba(112,66,248,0.3)]"
              [style.transition-delay]="i * 50 + 'ms'"
            >
              <img
                [src]="
                  '/' +
                  item.toLowerCase().replace('.', '').replace(' ', '') +
                  '.png'
                "
                [alt]="item"
                class="h-10 w-10 md:h-12 md:w-12 object-contain"
                onerror="
                  this.src = '/hero-bg.svg';
                  this.style.opacity = '0.5';
                "
              />

              <div
                class="absolute -top-10 left-1/2 -translate-x-1/2 scale-0 rounded bg-purple-600 px-2 py-1 text-[10px] font-bold text-white transition-all group-hover:scale-100"
              >
                {{ item }}
              </div>
            </div>
          }
        }
      </div>
    </div>
  </div>

  <div
    class="absolute bottom-0 left-0 w-full h-32 bg-gradient-to-t from-[#030014] to-transparent z-[2]"
  ></div>
</section>
