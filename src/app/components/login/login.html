<section
  class="min-h-screen flex items-center justify-center bg-[var(--color-brand-dark)] py-20 px-6 relative overflow-hidden"
>
  <div class="absolute inset-0 opacity-10 z-0 pointer-events-none">
    <div
      class="w-96 h-96 bg-[var(--color-brand-primary)] rounded-full absolute top-10 left-10 blur-3xl animate-custom-blob"
    ></div>
    <div
      class="w-80 h-80 bg-[var(--color-brand-highlight)] rounded-full absolute bottom-10 right-10 blur-3xl animate-custom-blob"
      style="animation-delay: -2s"
    ></div>
  </div>

  <div
    class="bg-[var(--color-brand-surface)] p-8 md:p-12 rounded-2xl shadow-2xl w-full max-w-md relative z-10 border-t-4 border-[var(--color-brand-primary)] opacity-0 apply-fade-in-up"
  >
    <div class="text-center mb-10">
      <h2 class="text-3xl font-[var(--font-display)] font-bold text-white mb-2">
        Admin <span class="text-[var(--color-brand-primary)]">Access</span>
      </h2>
      <p class="text-slate-400 font-[var(--font-body)]">
        Sign in to manage your portfolio.
      </p>
    </div>

    @if (errorMessage()) {
    <div
      class="bg-red-500/10 border-l-4 border-red-500 text-red-500 p-4 rounded mb-6 text-sm flex items-center font-[var(--font-body)]"
    >
      <i class="fas fa-exclamation-circle mr-3 text-lg"></i>
      {{ errorMessage() }}
    </div>
    }

    <form (ngSubmit)="onSubmit()" class="space-y-6">
      <div>
        <label
          for="username"
          class="block text-sm font-medium text-slate-300 mb-2 font-[var(--font-body)]"
        >
          Username
        </label>
        <div class="relative">
          <div
            class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"
          >
            <i class="fas fa-user text-slate-500"></i>
          </div>
          <input
            type="text"
            id="username"
            name="username"
            [ngModel]="username()"
            (ngModelChange)="username.set($event)"
            class="w-full bg-[var(--color-brand-dark)] border border-slate-700 rounded-lg pl-10 pr-4 py-3 text-white focus:outline-none focus:border-[var(--color-brand-primary)] focus:ring-1 focus:ring-[var(--color-brand-primary)] transition-colors duration-200"
            placeholder="Enter your username"
            required
            [disabled]="isLoading()"
          />
        </div>
      </div>

      <div>
        <label
          for="password"
          class="block text-sm font-medium text-slate-300 mb-2 font-[var(--font-body)]"
        >
          Password
        </label>
        <div class="relative">
          <div
            class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"
          >
            <i class="fas fa-lock text-slate-500"></i>
          </div>
          <input
            type="password"
            id="password"
            name="password"
            [ngModel]="password()"
            (ngModelChange)="password.set($event)"
            class="w-full bg-[var(--color-brand-dark)] border border-slate-700 rounded-lg pl-10 pr-4 py-3 text-white focus:outline-none focus:border-[var(--color-brand-primary)] focus:ring-1 focus:ring-[var(--color-brand-primary)] transition-colors duration-200"
            placeholder="••••••••"
            required
            [disabled]="isLoading()"
          />
        </div>
      </div>

      <button
        type="submit"
        [disabled]="isLoading()"
        class="w-full bg-[var(--color-brand-primary)] hover:bg-[var(--color-brand-highlight)] text-[var(--color-brand-dark)] font-[var(--font-display)] font-bold py-3 px-4 rounded-lg transition-all duration-300 transform hover:scale-[1.02] disabled:opacity-70 disabled:hover:scale-100 disabled:cursor-not-allowed flex justify-center items-center shadow-[0_0_15px_rgba(var(--color-brand-primary-rgb),0.3)]"
      >
        @if (isLoading()) {
        <div
          class="animate-spin rounded-full h-5 w-5 border-t-2 border-b-2 border-[var(--color-brand-dark)] mr-2"
        ></div>
        Authenticating... } @else {
        <i class="fas fa-sign-in-alt mr-2"></i> Login }
      </button>
    </form>

    <div class="mt-8 text-center">
      <a
        href="/"
        class="text-slate-400 hover:text-[var(--color-brand-primary)] transition-colors duration-200 font-[var(--font-body)] text-sm inline-flex items-center"
      >
        <i class="fas fa-arrow-left mr-2"></i> Back to Portfolio
      </a>
    </div>
  </div>
</section>
