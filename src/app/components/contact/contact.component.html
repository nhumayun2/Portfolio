<section id="contact" class="py-24 relative bg-transparent overflow-hidden">
  <div
    class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-[#a388f5]/5 blur-[150px] rounded-full pointer-events-none z-0"
  ></div>

  <div class="container mx-auto px-6 relative z-10">
    <div class="text-center mb-8">
      <h2 class="text-4xl md:text-5xl font-bold text-white tracking-tighter">
        Let's
        <span
          class="text-transparent bg-clip-text bg-gradient-to-r from-[#a388f5] to-[#f588a3]"
          >Connect</span
        >
      </h2>
      <div
        class="h-1 w-16 mx-auto mt-4 bg-gradient-to-r from-[#a388f5] to-[#f588a3] rounded-full"
      ></div>
    </div>

    <p
      class="text-gray-400 text-sm md:text-base max-w-md mx-auto text-center mb-12 leading-relaxed"
    >
      Have a project in mind, a question, or just want to say hi? I'd love to
      hear from you! Feel free to reach out.
    </p>

    <div
      class="max-w-3xl mx-auto rounded-[2rem] border border-white/[0.05] bg-[#0d1126]/90 backdrop-blur-xl p-10 md:p-14 text-center shadow-[0_20px_50px_rgba(0,0,0,0.3)] relative overflow-hidden"
    >
      <div
        class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-[#a388f5] to-[#f588a3]"
      ></div>

      <h4
        class="text-[10px] font-bold text-gray-500 tracking-[0.2em] uppercase mb-4"
      >
        Primary Contact
      </h4>
      <a
        [href]="'mailto:' + (profile()?.email || 'nhumayun291@gmail.com')"
        class="text-2xl md:text-4xl font-bold text-white hover:text-[#a388f5] transition-colors break-all inline-block"
      >
        {{ profile()?.email || "nhumayun291@gmail.com" }}
      </a>

      <h4
        class="text-[10px] font-bold text-gray-500 tracking-[0.2em] uppercase mt-16 mb-6"
      >
        Find Me On
      </h4>
      <div class="flex flex-wrap justify-center gap-4">
        @for (social of socials; track social.name) {
          <a
            [href]="social.url"
            target="_blank"
            [title]="social.name"
            class="flex h-12 w-12 md:h-14 md:w-14 items-center justify-center rounded-2xl bg-white/[0.03] border border-white/[0.05] text-gray-400 hover:bg-white/[0.08] hover:text-white transition-all duration-300 hover:-translate-y-1 shadow-sm"
          >
            <i [class]="social.icon + ' text-xl'"></i>
          </a>
        }
      </div>
    </div>
  </div>
</section>
