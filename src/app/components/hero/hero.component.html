<section
  id="hero"
  class="relative min-h-screen flex items-center justify-center pt-20 overflow-hidden bg-[var(--color-brand-dark)]"
  #heroSection
>
  <div class="blob-scene" #blobScene>
    <div class="blob blob-1" #blob1></div>
    <div class="blob blob-2" #blob2></div>
    <div class="blob blob-3" #blob3></div>

    <div class="blob-ring blob-ring-1" #blobRing1></div>
    <div class="blob-ring blob-ring-2" #blobRing2></div>
  </div>

  <div class="container mx-auto px-6 relative z-10">
    @if (profile(); as data) {
      <div class="grid grid-cols-1 lg:grid-cols-12 gap-12 items-center">
        <div class="lg:col-span-7 text-center lg:text-left order-2 lg:order-1">
          <div
            class="glass-panel p-8 md:p-12 rounded-[40px] relative overflow-hidden apply-fade-in-up"
          >
            <div
              class="absolute -top-10 -right-10 w-32 h-32 bg-[var(--color-brand-primary)] blur-3xl opacity-20"
            ></div>

            <h1
              class="text-5xl md:text-7xl font-[var(--font-display)] font-black leading-[1.1] mb-6 text-white"
            >
              Hi, I'm <br />
              <span
                class="text-transparent bg-clip-text bg-gradient-to-r from-[var(--color-brand-primary)] via-[var(--color-brand-highlight)] to-[var(--color-brand-secondary)]"
              >
                {{ data.fullName }}
              </span>
            </h1>

            <div
              class="flex items-center justify-center lg:justify-start gap-3 mb-8"
            >
              <span
                class="h-[2px] w-12 bg-[var(--color-brand-highlight)] rounded-full shadow-[0_0_10px_var(--color-brand-highlight)]"
              ></span>
              <p
                class="text-xl md:text-2xl font-medium text-slate-200 tracking-wide uppercase"
              >
                {{ data.title }}
              </p>
            </div>

            <p
              class="font-[var(--font-body)] text-lg md:text-xl text-slate-400 mb-10 leading-relaxed max-w-2xl mx-auto lg:mx-0"
            >
              {{ data.summary }}
            </p>

            <div
              class="flex flex-col sm:flex-row gap-5 justify-center lg:justify-start"
            >
              <a
                href="#contact"
                class="group relative px-8 py-4 bg-[var(--color-brand-primary)] text-[var(--color-brand-dark)] font-bold rounded-2xl overflow-hidden transition-all duration-300 hover:scale-105 shadow-[0_0_30px_rgba(132,204,22,0.3)]"
              >
                <span
                  class="relative z-10 flex items-center justify-center gap-2"
                >
                  Get in Touch
                  <i
                    class="fas fa-paper-plane group-hover:translate-x-1 group-hover:-translate-y-1 transition-transform"
                  ></i>
                </span>
              </a>

              <a
                href="#portfolio"
                class="px-8 py-4 bg-white/5 border border-white/10 text-white font-bold rounded-2xl backdrop-blur-md hover:bg-white/10 hover:border-white/20 transition-all duration-300 flex items-center justify-center gap-2 shadow-xl"
              >
                View My Work <i class="fas fa-briefcase opacity-70"></i>
              </a>
            </div>
          </div>
        </div>

        <div
          class="lg:col-span-5 flex justify-center lg:justify-end order-1 lg:order-2"
        >
          <div class="relative apply-fade-in-up" style="animation-delay: 0.3s">
            <div
              class="absolute inset-0 bg-gradient-to-br from-[var(--color-brand-primary)] to-[var(--color-brand-secondary)] rounded-[60px] blur-3xl opacity-30 animate-pulse"
            ></div>

            <div
              class="relative w-64 h-64 sm:w-80 sm:h-80 xl:w-96 xl:h-96 p-3 glass-card rounded-[60px] transform hover:rotate-3 transition-transform duration-700 shadow-2xl"
            >
              <img
                [attr.src]="'/me.jpg'"
                [attr.alt]="data.fullName"
                loading="eager"
                class="w-full h-full object-cover rounded-[50px] shadow-2xl grayscale-[15%] hover:grayscale-0 transition-all duration-700"
              />

              <div
                class="absolute -bottom-6 -left-6 glass-card px-6 py-4 rounded-2xl shadow-2xl border-white/20 animate-bounce-slow"
              >
                <div class="flex items-center gap-3">
                  <div
                    class="w-3 h-3 bg-green-500 rounded-full animate-ping"
                  ></div>
                  <span
                    class="text-sm font-bold text-white tracking-widest uppercase"
                    >Available</span
                  >
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    } @else {
      <div class="flex flex-col items-center gap-6">
        <div
          class="animate-spin rounded-full h-16 w-16 border-t-2 border-b-2 border-[var(--color-brand-primary)] shadow-[0_0_30px_rgba(132,204,22,0.4)]"
        ></div>
        <p
          class="text-slate-500 font-bold tracking-[0.2em] uppercase text-xs animate-pulse"
        >
          Synchronizing Data...
        </p>
      </div>
    }
  </div>
</section>
