<section
  id="hero"
  class="relative flex flex-col min-h-screen w-full items-center justify-center pt-20 overflow-hidden"
  style="
    background: radial-gradient(
      circle at 50% 40%,
      rgba(112, 66, 248, 0.15) 0%,
      #030014 70%
    );
  "
>
  <video
    autoplay
    muted
    loop
    playsinline
    class="rotate-180 absolute top-[-30%] md:top-[-500px] left-0 w-full h-[120%] object-cover z-[1] pointer-events-none mix-blend-lighten opacity-90 [mask-image:linear-gradient(to_bottom,black_50%,transparent_90%)]"
  >
    <source src="/blackhole.webm" type="video/webm" />
  </video>

  <div
    class="absolute bottom-0 left-0 w-full h-[500px] z-[2] pointer-events-none"
    style="
      background: linear-gradient(
        to bottom,
        transparent,
        rgba(112, 66, 248, 0.1) 20%,
        #030014 90%
      );
    "
  ></div>

  <div
    class="container mx-auto px-6 relative z-[10] flex flex-col lg:flex-row items-center justify-center w-full mt-20 lg:mt-0"
  >
    @if (profile(); as data) {
      <div
        class="h-full w-full flex flex-col gap-5 justify-center m-auto text-center lg:text-start lg:w-1/2"
      >
        <div
          class="Welcome-box py-[8px] px-[12px] border border-[#7042f88b] opacity-[0.9] mx-auto lg:mx-0 flex items-center w-max bg-[#0300145e] backdrop-blur-sm"
        >
          <i class="fas fa-sparkles text-[#b49bff] mr-[10px] text-sm"></i>
          <h1
            class="Welcome-text text-[13px] font-semibold uppercase tracking-wider"
          >
            Fullstack Developer Portfolio
          </h1>
        </div>

        <div
          class="flex flex-col gap-6 mt-6 text-5xl md:text-7xl font-bold text-white max-w-[600px] w-auto h-auto mx-auto lg:mx-0 tracking-tighter"
        >
          <span class="leading-[1.1]">
            Providing
            <span
              class="text-transparent bg-clip-text bg-gradient-to-r from-purple-500 to-cyan-500"
            >
              the best
            </span>
            project experience.
          </span>
        </div>

        <p
          class="text-lg text-gray-400 my-5 max-w-[600px] mx-auto lg:mx-0 leading-relaxed"
        >
          Hi, I'm {{ data.fullName }}, a {{ data.title }} specialized in
          building high-performance applications. Check out my projects and
          skills.
        </p>

        <div class="mx-auto lg:mx-0 w-full sm:w-60 mt-4">
          <a
            href="#about"
            class="relative inline-flex h-12 w-full overflow-hidden rounded-lg p-[1px] focus:outline-none group"
          >
            <span
              class="absolute inset-[-1000%] animate-[spin_2s_linear_infinite] bg-[conic-gradient(from_90deg_at_50%_50%,#E2CBFF_0%,#393BB2_50%,#E2CBFF_100%)]"
            ></span>
            <span
              class="inline-flex h-full w-full cursor-pointer items-center justify-center gap-2 rounded-lg bg-slate-950 px-7 text-sm font-medium text-white backdrop-blur-3xl"
            >
              Show my work
              <i class="fas fa-location-arrow text-xs text-purple-400"></i>
            </span>
          </a>
        </div>
      </div>

      <div
        class="w-full h-full flex justify-center items-center lg:w-1/2 mt-16 lg:mt-0 animate-float"
      >
        <img
          src="/hero-bg.svg"
          alt="work icons"
          class="w-[350px] md:w-[500px] lg:w-[600px] object-contain select-none drop-shadow-[0_0_50px_rgba(112,66,248,0.3)]"
          draggable="false"
        />
      </div>
    }
  </div>
</section>
