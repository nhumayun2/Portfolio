<section id="journey" class="relative py-20 bg-transparent overflow-hidden">
  <div
    class="absolute top-1/4 left-1/2 -translate-x-1/2 w-full h-full pointer-events-none z-0"
  >
    <div
      class="h-[500px] w-[500px] rounded-full bg-purple-500/5 blur-[120px]"
    ></div>
  </div>

  <div class="container mx-auto px-6 relative z-10">
    <div class="text-center mb-20">
      <h2 class="text-4xl md:text-6xl font-bold text-white tracking-tighter">
        My Professional
        <span
          class="text-transparent bg-clip-text bg-gradient-to-r from-purple-500 to-cyan-500"
          >Journey</span
        >
      </h2>
      <p class="text-gray-400 mt-4 text-lg">
        A timeline of growth, challenges, and technical evolution.
      </p>
    </div>

    <div class="max-w-4xl mx-auto relative">
      <div
        class="absolute left-[19px] top-2 h-[95%] w-[2px] bg-gradient-to-b from-purple-500 via-purple-500/50 to-transparent z-0"
      ></div>

      <div class="space-y-4">
        @for (exp of experiences(); track exp.id) {
          <app-experience-card
            [jobTitle]="exp.jobTitle"
            [companyName]="exp.companyName"
            [dateRange]="formatDateRange(exp)"
            [responsibilities]="exp.responsibilities"
            [isCurrent]="exp.isCurrentRole"
          />
        } @empty {
          <div class="flex gap-8 pb-12">
            <div class="flex flex-col items-center">
              <div
                class="h-10 w-10 rounded-full bg-slate-800 animate-pulse"
              ></div>
              <div class="h-20 w-[2px] bg-slate-800"></div>
            </div>
            <div
              class="flex-1 h-32 rounded-2xl bg-slate-800/20 animate-pulse"
            ></div>
          </div>
        }
      </div>
    </div>
  </div>

  <div
    class="absolute bottom-0 left-0 w-full h-24 bg-gradient-to-t from-[#030014] to-transparent z-10"
  ></div>
</section>
