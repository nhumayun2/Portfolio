<section
  id="about"
  class="relative bg-[var(--color-brand-surface)] text-[var(--color-brand-text-on-dark)] py-20 md:py-28 overflow-hidden"
>
  <div class="blob-scene">
    <div
      #blob2
      class="blob blob-2 transition-transform duration-75 ease-out"
      style="top: -10%; right: -5%; bottom: auto; left: auto; opacity: 0.3"
    ></div>
    <div
      #blob3
      class="blob blob-3 transition-transform duration-75 ease-out"
      style="bottom: -10%; left: -5%; top: auto; right: auto; opacity: 0.25"
    ></div>
    <div
      #blobRing
      class="blob-ring blob-ring-2 transition-transform duration-75 ease-out"
      style="top: 20%; left: 15%"
    ></div>
  </div>

  <div class="container mx-auto px-6 max-w-5xl relative z-10">
    @if (profile(); as data) {
      <div
        class="text-center mb-16 md:mb-20 opacity-0 apply-fade-in-up"
        style="animation-delay: 0.1s"
      >
        <h2
          class="text-4xl md:text-5xl font-[var(--font-display)] font-bold mb-4"
        >
          About <span class="text-[var(--color-brand-primary)]">Me</span>
        </h2>
        <div class="w-24 h-1 bg-[var(--color-brand-primary)] mx-auto"></div>
      </div>

      <div
        class="grid grid-cols-1 md:grid-cols-12 gap-12 md:gap-16 items-center"
      >
        <div
          class="md:col-span-5 flex justify-center opacity-0 apply-fade-in-up"
          style="animation-delay: 0.3s"
        >
          <div
            class="relative group w-60 h-60 sm:w-72 sm:h-72 rounded-full p-2 bg-gradient-to-br from-[var(--color-brand-secondary)] via-[var(--color-brand-highlight)] to-[var(--color-brand-primary)]"
          >
            <div
              class="absolute inset-0 rounded-full bg-[var(--color-brand-primary)] opacity-20 blur-xl group-hover:opacity-30 transition-opacity duration-300 animate-pulse-slower"
            ></div>
            <img
              src="/77454208.jfif"
              [alt]="data.fullName"
              class="relative w-full h-full object-cover rounded-full border-4 border-[var(--color-brand-surface)] shadow-xl group-hover:scale-105 transition-transform duration-300"
            />

            <div
              class="absolute -top-4 -right-4 w-16 h-16 bg-[var(--color-brand-highlight)] rounded-lg transform rotate-45 opacity-30 group-hover:opacity-50 transition-opacity duration-300 blur-sm"
            ></div>
          </div>
        </div>

        <div
          class="md:col-span-7 opacity-0 apply-fade-in-up"
          style="animation-delay: 0.5s"
        >
          <div
            class="glass-panel p-8 md:p-10 rounded-[30px] relative overflow-hidden"
          >
            <h3
              class="text-2xl md:text-3xl font-[var(--font-display)] font-semibold text-white mb-6"
            >
              A Glimpse into My World
            </h3>

            <div
              class="font-[var(--font-body)] text-lg text-slate-300 space-y-5 leading-relaxed relative z-10"
            >
              <p>
                {{ data.summary }}
              </p>
              <p>
                Currently seeking opportunities to contribute to innovative
                projects that make a real difference.
              </p>
            </div>

            <div class="mt-10 text-center md:text-left relative z-10">
              <a
                [href]="data.cvUrl ? data.cvUrl : '/Humayun_Ahmed_Niloy.pdf'"
                target="_blank"
                class="group inline-block relative overflow-hidden bg-[var(--color-brand-primary)] text-[var(--color-brand-dark)] font-[var(--font-display)] font-bold py-3 px-8 rounded-lg text-lg transition-all duration-300 ease-in-out transform hover:scale-105 shadow-lg hover:shadow-[var(--color-brand-primary)]/50"
              >
                <span
                  class="absolute inset-0 w-0 bg-[var(--color-brand-highlight)] transition-all duration-[350ms] ease-out group-hover:w-full"
                ></span>
                <span class="relative"
                  ><i class="fas fa-download mr-2"></i> Download CV</span
                >
              </a>
            </div>
          </div>
        </div>
      </div>
    }
  </div>
</section>
