<section id="about" class="py-20 bg-transparent relative z-10">
  <div class="container mx-auto px-6 max-w-7xl">
    <div class="mb-12 opacity-0 apply-fade-in-up" style="animation-delay: 0.1s">
      <h2
        class="text-3xl md:text-5xl font-bold text-white text-center tracking-tighter"
      >
        A Glimpse into
        <span
          class="text-transparent bg-clip-text bg-gradient-to-r from-purple-500 to-cyan-500"
          >My World</span
        >
      </h2>
    </div>

    <div
      class="grid grid-cols-1 md:grid-cols-5 gap-4 md:gap-8 auto-rows-[18rem] md:auto-rows-[20rem]"
    >
      <app-bento-grid-item
        [id]="1"
        title="Software Engineer specializing in Software Engineering"
        description="Proficient in JavaScript, Java, C++, and C#. Experienced in web development, problem-solving, and continuous learning. Currently seeking opportunities to contribute to innovative projects that make a real difference."
        className="md:col-span-3 md:row-span-2"
        img="/b1.svg"
        imgClassName="w-full h-full opacity-30"
        titleClassName="justify-end"
        [showCvButton]="true"
        [cvUrl]="profile()?.cvUrl"
      />

      <app-bento-grid-item
        [id]="2"
        title="I'm very flexible with time zone communications"
        description="Global Availability"
        className="md:col-span-2 md:row-span-1"
        titleClassName="justify-start"
      />

      <app-bento-grid-item
        [id]="3"
        title="My Tech Stack"
        description="I constantly try to improve"
        className="md:col-span-2 md:row-span-1"
        titleClassName="justify-center"
      />

      <app-bento-grid-item
        [id]="4"
        title="Tech enthusiast with a passion for development."
        description=""
        className="md:col-span-2 md:row-span-1"
        img="/grid.svg"
        spareImg="/b4.svg"
        titleClassName="justify-start"
      />

      <app-bento-grid-item
        [id]="5"
        title="Currently building a custom 3D Animation engine"
        description="The Inside Scoop"
        className="md:col-span-3 md:row-span-2"
        img="/b5.svg"
        imgClassName="absolute right-0 bottom-0 md:w-96 w-60 opacity-50"
        spareImg="/grid.svg"
        titleClassName="justify-center md:justify-start lg:justify-center"
      />

      @if (profile(); as data) {
        <app-bento-grid-item
          [id]="6"
          title="Do you want to start a project together?"
          description=""
          [email]="data.email"
          className="md:col-span-2 md:row-span-1"
          titleClassName="justify-center md:max-w-full max-w-60 text-center"
        />
      }
    </div>
  </div>
</section>
