<section id="projects" class="py-20 relative bg-transparent">
  <div class="container mx-auto px-6 relative z-10">
    <div class="text-center mb-16">
      <h2 class="text-4xl md:text-5xl font-bold text-white tracking-tighter">
        Featured
        <span
          class="text-transparent bg-clip-text bg-gradient-to-r from-[#a388f5] to-[#f588a3]"
          >Projects</span
        >
      </h2>
      <div
        class="h-1 w-20 mx-auto mt-4 bg-gradient-to-r from-[#a388f5] to-[#f588a3] rounded-full"
      ></div>
    </div>

    <div
      class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 justify-items-center"
    >
      @for (project of projects(); track project.id) {
        <app-project-card
          [title]="project.title"
          [description]="project.description"
          [image]="project.imageUrl || '/hero-bg.svg'"
          [techStack]="getTechStack(project)"
          [liveUrl]="project.liveUrl || ''"
          [gitHubUrl]="project.gitHubUrl || ''"
        />
      } @empty {
        <div
          class="col-span-full py-20 flex flex-col items-center justify-center space-y-4"
        >
          <div
            class="h-10 w-10 animate-spin rounded-full border-4 border-[#a388f5]/20 border-t-[#a388f5]"
          ></div>
          <p class="text-gray-500 font-medium">Loading projects...</p>
        </div>
      }
    </div>
  </div>
</section>
