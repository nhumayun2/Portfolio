<section id="projects" class="py-20 relative bg-transparent">
  <div class="container mx-auto px-6">
    <div class="text-center mb-16">
      <h2 class="text-4xl md:text-6xl font-bold text-white tracking-tighter">
        A small selection of
        <span
          class="text-transparent bg-clip-text bg-gradient-to-r from-purple-500 to-cyan-500"
        >
          recent projects
        </span>
      </h2>
      <p class="text-gray-400 mt-4 text-lg">
        Exploring the intersection of performance and design.
      </p>
    </div>

    <div
      class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 justify-items-center"
    >
      @for (project of projects(); track project.id) {
        <app-project-card
          [title]="project.title"
          [description]="project.description"
          [image]="project.imageUrl || '/p1.svg'"
          [techStack]="getTechStack(project)"
          [link]="project.liveUrl || ''"
        />
      } @empty {
        <div
          class="col-span-full py-20 flex flex-col items-center justify-center space-y-4"
        >
          <div
            class="h-12 w-12 animate-spin rounded-full border-4 border-purple-500/20 border-t-purple-500"
          ></div>
          <p class="text-gray-500 font-medium animate-pulse">
            Connecting to PostgreSQL...
          </p>
        </div>
      }
    </div>
  </div>
</section>
